<!DOCTYPE html>
<html>
<head>
    <title>Graphics Scene</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe4ec;
        }

        canvas {
            border: 3px solid #ff1744;
        }
    </style>
</head>

<body>

<canvas id="myCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById("myCanvas");
    const ctx = canvas.getContext("2d");

    ctx.fillStyle = "#ffd1dc";
    ctx.fillRect(0, 0, 800, 500);

    ctx.fillStyle = "#ff5c8a";
    ctx.fillRect(0, 300, 800, 200);

    ctx.beginPath();
    ctx.arc(120, 100, 50, 0, 2 * Math.PI);
    ctx.fillStyle = "#ff0033";
    ctx.fill();

    ctx.fillStyle = "#ff69b4";
    ctx.fillRect(400, 220, 150, 120);

    ctx.beginPath();
    ctx.moveTo(400, 220);
    ctx.lineTo(475, 150);
    ctx.lineTo(550, 220);
    ctx.fillStyle = "#d1001f";
    ctx.fill();

    ctx.fillStyle = "#800020";
    ctx.fillRect(460, 270, 30, 70);

    ctx.fillStyle = "#fff0f5";
    ctx.fillRect(420, 240, 30, 30);
    ctx.fillRect(500, 240, 30, 30);
</script>

</body>
</html>
